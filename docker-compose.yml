services:
  # =========================================================================
  # ONLYOFFICE Document Server
  # =========================================================================
  document-server:
    image: onlyoffice/documentserver:latest
    container_name: oo-document-server
    restart: unless-stopped

    environment:
      JWT_ENABLED: ${JWT_ENABLED:-true}
      JWT_SECRET:  ${DOCUMENT_SERVER_JWT_SECRET:-}
      JWT_HEADER:  ${JWT_HEADER:-Authorization}
      JWT_IN_BODY: ${JWT_IN_BODY:-false}
      ALLOW_PRIVATE_IP_ADDRESS: ${ALLOW_PRIVATE_IP_ADDRESS:-true}
      ALLOW_META_IP_ADDRESS:    ${ALLOW_META_IP_ADDRESS:-true}
      USE_UNAUTHORIZED_STORAGE: ${USE_UNAUTHORIZED_STORAGE:-true}
      EXAMPLE_ENABLED: ${EXAMPLE_ENABLED:-true}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      DS_LOG_LEVEL:    ${DS_LOG_LEVEL:-warn}
      GENERATE_FONTS: ${GENERATE_FONTS:-true}
      WOPI_ENABLED:   ${WOPI_ENABLED:-false}

    ports:
      - "${DS_PORT:-18000}:80"

    volumes:
      - ds-data:/var/www/onlyoffice/Data
      - ds-log:/var/log/onlyoffice
      - ds-cache:/var/lib/onlyoffice
      - ds-fonts:/usr/share/fonts/truetype/custom

    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:80/healthcheck"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 60s

    stop_grace_period: 60s

  # =========================================================================
  # ONLYOFFICE Gateway (API)
  # =========================================================================
  gateway:
    build:
      context: .
    container_name: oo-gateway
    restart: unless-stopped

    environment:
      DOCUMENT_SERVER_JWT_SECRET:       ${DOCUMENT_SERVER_JWT_SECRET:-}
      GATEWAY_ADMIN_SESSION_SECRET:     ${GATEWAY_ADMIN_SESSION_SECRET:-}
      GATEWAY_CALLBACK_CAPABILITY_SECRET: ${GATEWAY_CALLBACK_CAPABILITY_SECRET:-}
      WEBHOOK_SECRET_ENCRYPTION_KEY:    ${WEBHOOK_SECRET_ENCRYPTION_KEY:-}
      LISTEN_ADDR:         0.0.0.0:18080
      DOCUMENT_SERVER_URL: http://document-server
      DOCUMENT_SERVER_PUBLIC_URL: ${DOCUMENT_SERVER_PUBLIC_URL:-}
      STORAGE_BACKEND:     ${STORAGE_BACKEND:-local}
      STORAGE_DIR:         /app/data
      S3_ENDPOINT:         ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION:           ${S3_REGION:-us-east-1}
      S3_BUCKET:           ${S3_BUCKET:-onlyoffice}
      S3_ACCESS_KEY:       ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY:       ${S3_SECRET_KEY:-minioadmin}
      S3_USE_PATH_STYLE:   ${S3_USE_PATH_STYLE:-true}
      S3_USE_SSL:          ${S3_USE_SSL:-false}
      S3_PREFIX:           ${S3_PREFIX:-documents}
      TTL_HOURS:           ${TTL_HOURS:-8}
      WEBHOOK_MAX_RETRIES: ${WEBHOOK_MAX_RETRIES:-3}
      ADMIN_USERNAME:      ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD:      ${ADMIN_PASSWORD:-}
      SERVICE_STORE_PATH:  /app/data/services.json
      ADMIN_AUDIT_LOG_DIR: /app/data/audit
      ADMIN_AUDIT_LOG_RETENTION_DAYS: ${ADMIN_AUDIT_LOG_RETENTION_DAYS:-14}

    ports:
      - "${GATEWAY_PORT:-18080}:18080"

    volumes:
      - gateway-data:/app/data

    depends_on:
      document-server:
        condition: service_healthy

    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:18080/api/v1/health"]
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 5s

    stop_grace_period: 10s

  # =========================================================================
  # Optional MinIO for local S3-compatible storage development
  # Start with: docker compose --profile minio up -d
  # =========================================================================
  minio:
    image: minio/minio:latest
    container_name: oo-minio
    profiles: ["minio"]
    restart: unless-stopped
    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER:     ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}

    ports:
      - "${MINIO_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"

    volumes:
      - minio-data:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: oo-minio-init
    profiles: ["minio"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-onlyoffice}
      "

  # =========================================================================
  # Admin UI (SPA served by nginx, proxying /admin/api to gateway)
  # =========================================================================
  admin-ui:
    build:
      context: ./admin-ui
    container_name: oo-admin-ui
    restart: unless-stopped

    ports:
      - "${ADMIN_UI_PORT:-18081}:80"

    depends_on:
      gateway:
        condition: service_healthy

volumes:
  ds-data:
  ds-log:
  ds-cache:
  ds-fonts:
  gateway-data:
  minio-data:
